name: Web Deploy

# Production is published from a separate internal deploy pipeline. This workflow
# is manual-only so a push here can't overwrite the production deployment; run it
# by hand (workflow_dispatch) only to publish this build deliberately.
on:
  workflow_dispatch:

# One deploy at a time so a fast-follow merge can't publish a stale bundle
# over a fresher one; the older run is cancelled.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # base defaults to '/' for the root-domain Cloudflare deploy; the
      # public/_headers and public/_redirects files are copied into dist.
      - name: Build web bundle
        run: npm run build --workspace @arduconfig/web

      # Build the Sphinx wiki into the bundle at /wiki so it ships with the app
      # on the same origin — the header "Wiki" button links to /wiki/. Cloudflare
      # Pages serves these static files directly; the SPA catch-all only applies
      # to paths with no matching file, so /wiki/* is unaffected.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build wiki into the bundle
        run: |
          python -m pip install --upgrade pip
          pip install -r wiki/requirements.txt
          sphinx-build -b html wiki apps/web/dist/wiki

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=arduconfigurator --branch=main
