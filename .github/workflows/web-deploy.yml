name: Web Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

# One deploy at a time so a fast-follow merge can't publish a stale bundle
# over a fresher one; the older run is cancelled.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # base defaults to '/' for the root-domain Cloudflare deploy; the
      # public/_headers and public/_redirects files are copied into dist.
      - name: Build web bundle
        run: npm run build --workspace @arduconfig/web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=arduconfigurator --branch=main
